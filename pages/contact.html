<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
</head>

<body>
    <header>
        <h1>Contact Victonale Academy</h1>
    </header>
    <main>
        <h2>Visit Us</h2>
        <address>
            <strong>Victonale Academy</strong><br>
            Liboben Junction,<br>
            Kapcherop, Kenya, private-bag
            <br>
            <br>
            <strong>Main line:</strong><a href="tel:+254-723-496-260">+254&nbsp;723&nbsp;496&nbsp;260</a><br>
            <strong>Admission:</strong><a href="tel:+254-723-496-260">+254&nbsp;723&nbsp;496&nbsp;260</a><br>
            <strong>clinic (24/7):</strong><a href="tel:+254-723-496-260">+254&nbsp;723&nbsp;496&nbsp;260</a><br>
            <strong>Email:</strong><a href="mailto:victonaleacademy@gmail.com">victonaleacademy@gmail.com</a>
        </address><br>
        <form action="" method="post">
            <fieldset>
                <legend><strong>General Enquiry Form</strong></legend>
                <p>
                    <label for="full_name">Full Name:*</label><br>
                    <input type="text" name="full_name" placeholder="Your full name" required id="full_name" size="30">
                </p>
                <p>
                    <label for="email">Email Address:*</label><br>
                    <input type="email" id="email" required size="30" placeholder="example@gmail.com">
                </p>
                <p>
                    <label for="phone_number">Phone Number:</label><br>
                    <input type="number" required placeholder="+254 7XX XXX XXX">
                </p>
                <p>
                    <label for="occupation">I am a:</label><br>
                    <select name="occupation" id="occupation">
                        <option value="">--select--</option>
                        <option value="parent_guardian">Parent/Guardian</option>
                        <option value="current_student">Current Student</option>
                        <option value="prospective_student_parent">Prospective Student/Parent</option>
                        <option value="alumni">Alumni</option>
                        <option value="Staff_member">Staff Member</option>
                        <option value="other">Other</option>
                    </select>
                </p>
                <p>
                    <label for="department">Subject/Department</label><br>
                    <select name="department" id="department">
                        <option value="">--select Subject--</option>
                        <option value="admission">Admission Enquiry</option>
                        <option value="finance">Fee & Finance</option>
                        <option value="academics">Academic Information</option>
                        <option value="boarding">Boarding Information</option>
                        <option value="councelling">Guidance & cancelling</option>
                        <option value="complaints_feedback">Complaints or Feedback</option>
                        <option value="vacancies">Employment/Vacancies</option>
                        <option value="general_equiries">General Enquiries</option>
                    </select>
                </p>
                <p>
                    <label for="message">Message:*</label><br>
                    <textarea name="message" id="message" required placeholder="Type your message here" cols="30" rows="10" minlength="10" maxlength="200"></textarea>
                </p>
            </fieldset>
            <p>
                <input type="checkbox" id="subscription" name="newsletter_subscription">
                <label for="subscription">Subscribe&nbsp;to&nbsp;our&nbsp;school&nbsp;newsletter</label>
            </p>
            <input type="submit" value="submit" name="submit">
            <input type="reset" value="clear" name="reset">
        </form>
    </main>
    <hr>
    <footer>
        <h3>Victonale Academy</h3>
        
    </footer>
</body>

</html>
